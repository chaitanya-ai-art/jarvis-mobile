<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Jarvis Voice</title>
  <style>
    :root{color-scheme:dark;--bg:#070b14;--panel:#101727;--line:#23304b;--text:#eef4ff;--muted:#93a4bf;--accent:#4dd7ff;--ok:#58e39b;--danger:#ff8b8b}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#13213b 0,#070b14 42%);color:var(--text);min-height:100vh}
    .shell{max-width:900px;margin:auto;padding:18px 14px 88px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.brand{font-size:24px;font-weight:800;letter-spacing:.16em}.online{display:flex;gap:7px;align-items:center;color:var(--ok);font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px var(--ok)}
    .hero,.card{background:rgba(16,23,39,.92);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 50px rgba(0,0,0,.25)}.hero{padding:20px;margin-bottom:14px}.hero h1{font-size:23px;margin:0 0 6px}.muted{color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}.metric{padding:15px}.metric strong{display:block;font-size:25px;margin-top:5px;color:var(--accent)}
    .card{padding:14px;margin-bottom:14px}.card h2{font-size:16px;margin:0 0 12px}.chat{height:310px;overflow:auto;display:flex;flex-direction:column;gap:9px;padding:4px}.bubble{max-width:85%;padding:11px 13px;border-radius:15px;line-height:1.4;white-space:pre-wrap}.you{align-self:flex-end;background:#1c5f8c}.jarvis{align-self:flex-start;background:#18233a;border:1px solid #293955}.composer{display:flex;gap:8px;margin-top:12px}.composer input{flex:1;min-width:0;border:1px solid var(--line);background:#0b1120;color:var(--text);border-radius:14px;padding:13px;font-size:16px}.btn{border:0;border-radius:14px;padding:0 16px;background:linear-gradient(135deg,#36bff1,#5887ff);color:white;font-weight:700}.voice{min-width:52px;background:#27334c;font-size:19px}.voice.listening{background:#a52b44;box-shadow:0 0 0 5px rgba(255,87,119,.16);animation:pulse 1s infinite}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.quick button,.voice-settings button,.voice-settings select,.voice-settings label{padding:11px 8px;border-radius:12px;border:1px solid var(--line);background:#121b2e;color:var(--text)}
    .voice-settings{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.voice-settings label{display:flex;align-items:center;gap:8px}.transcript{min-height:22px;color:var(--accent);font-size:13px;margin:5px 0}.error{color:var(--danger)!important}#notice{font-size:12px;color:var(--muted);margin-top:8px}@keyframes pulse{50%{transform:scale(1.05)}}@media(min-width:700px){.grid{grid-template-columns:repeat(6,1fr)}.metric{grid-column:span 2}.chat{height:390px}.voice-settings{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<main class="shell">
  <header class="top"><div class="brand">JARVIS</div><div class="online"><span class="dot"></span><span id="connection">Connecting</span></div></header>
  <section class="hero"><h1 id="greeting">Hello, Chinna</h1><div class="muted">Voice assistant and Windows control</div></section>
  <section class="grid">
    <div class="card metric"><span class="muted">Projects</span><strong id="projects">–</strong></div><div class="card metric"><span class="muted">Goals</span><strong id="goals">–</strong></div><div class="card metric"><span class="muted">Reminders</span><strong id="reminders">–</strong></div><div class="card metric"><span class="muted">Memories</span><strong id="memories">–</strong></div><div class="card metric"><span class="muted">CPU</span><strong id="cpu">–</strong></div><div class="card metric"><span class="muted">RAM</span><strong id="ram">–</strong></div>
  </section>
  <section class="card"><h2>PC controls</h2><div class="quick"><button onclick="sendText('open Excel')">Excel</button><button onclick="sendText('open Chrome')">Chrome</button><button onclick="sendText('open Downloads')">Downloads</button><button onclick="sendText('open Notepad')">Notepad</button><button onclick="sendText('system info')">PC Status</button><button onclick="sendText('recent actions')">Activity</button></div></section>
  <section class="card"><h2>Voice settings</h2><div class="voice-settings"><select id="voiceLang"><option value="en-IN">English (India)</option><option value="te-IN">Telugu</option><option value="hi-IN">Hindi</option></select><label><input id="autoSpeak" type="checkbox" checked> Speak replies</label><label><input id="wakeMode" type="checkbox"> Hey Jarvis mode</label><button id="testVoice">Test voice</button><button id="stopVoice">Stop speaking</button></div><div id="transcript" class="transcript">Tap the microphone and speak.</div></section>
  <section class="card"><h2>Live chat</h2><div id="chat" class="chat"><div class="bubble jarvis">Jarvis voice assistant is ready.</div></div><div class="composer"><input id="message" autocomplete="off" placeholder="Message or speak to Jarvis…"><button class="btn voice" id="voice" title="Push to talk">🎤</button><button class="btn" id="send">Send</button></div><div id="notice">Use the exact PHONE APP URL printed by Jarvis.</div></section>
</main>
<script>
const qs=new URLSearchParams(location.search),urlToken=qs.get('token')||'';localStorage.removeItem('jarvis_token');if(urlToken)history.replaceState({},document.title,'/mobile');
const notice=document.getElementById('notice'),chat=document.getElementById('chat'),input=document.getElementById('message'),mic=document.getElementById('voice'),transcript=document.getElementById('transcript'),lang=document.getElementById('voiceLang'),autoSpeak=document.getElementById('autoSpeak'),wakeMode=document.getElementById('wakeMode');let ws,retryTimer,recognition,isListening=false,wakeRestartTimer;
lang.value=localStorage.getItem('jarvis_voice_lang')||'en-IN';autoSpeak.checked=localStorage.getItem('jarvis_auto_speak')!=='false';wakeMode.checked=localStorage.getItem('jarvis_wake_mode')==='true';lang.onchange=()=>localStorage.setItem('jarvis_voice_lang',lang.value);autoSpeak.onchange=()=>localStorage.setItem('jarvis_auto_speak',autoSpeak.checked);wakeMode.onchange=()=>{localStorage.setItem('jarvis_wake_mode',wakeMode.checked);if(wakeMode.checked)startRecognition(true);else stopListening()};
function add(text,who='jarvis'){const d=document.createElement('div');d.className='bubble '+who;d.textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function speak(text){if(!autoSpeak.checked||!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang.value;u.rate=.95;u.pitch=1;window.speechSynthesis.speak(u)}
async function api(path){const r=await fetch(path,{credentials:'same-origin',cache:'no-store'});if(r.status===401)throw new Error('Session expired. Reopen the current PHONE APP URL from the PC window.');if(!r.ok)throw new Error('Jarvis request failed');return r.json()}
async function refresh(){try{const s=await api('/dashboard/summary');document.getElementById('greeting').textContent=`Hello, ${s.user}`;for(const k of ['projects','goals','reminders','memories'])document.getElementById(k).textContent=s.counts[k];document.getElementById('cpu').textContent=Math.round(s.cpu_percent)+'%';document.getElementById('ram').textContent=Math.round(s.memory_percent)+'%';notice.textContent=`Jarvis ${s.version} • ${s.connected_devices} live connection(s)`;notice.className=''}catch(e){notice.textContent=e.message;notice.className='error'}}
function connect(){clearTimeout(retryTimer);const proto=location.protocol==='https:'?'wss':'ws';ws=new WebSocket(`${proto}://${location.host}/ws`);ws.onopen=()=>{document.getElementById('connection').textContent='Online';notice.className=''};ws.onclose=e=>{document.getElementById('connection').textContent=e.code===1008?'Unauthorized':'Reconnecting';if(e.code===1008){notice.textContent='Session expired. Reopen the current PHONE APP URL from the PC window.';notice.className='error';return}retryTimer=setTimeout(connect,1800)};ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='chat_reply'){add(m.message);speak(m.message)}if(m.type==='error'){add(m.message);speak(m.message)}if(m.type==='activity')refresh()}}
function sendText(text){text=(text||input.value).trim();if(!text)return;add(text,'you');input.value='';transcript.textContent='Sent: '+text;if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'chat',message:text,source:'voice_or_text'}));else add('Jarvis is reconnecting. Please try again.')}
document.getElementById('send').onclick=()=>sendText();input.addEventListener('keydown',e=>{if(e.key==='Enter')sendText()});
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function stopListening(){clearTimeout(wakeRestartTimer);if(recognition)try{recognition.stop()}catch(_){ }isListening=false;mic.classList.remove('listening');mic.textContent='🎤'}
function handleRecognized(text,continuousMode){text=(text||'').trim();if(!text)return;const lower=text.toLowerCase();if(continuousMode){const wakeWords=['hey jarvis','hi jarvis','hello jarvis'];const wake=wakeWords.find(w=>lower.includes(w));if(!wake){transcript.textContent='Waiting for “Hey Jarvis”…';return}const command=text.slice(lower.indexOf(wake)+wake.length).trim().replace(/^[,.:;\-]+/,'').trim();if(!command){transcript.textContent='Listening for your command…';speak('Yes Chinna?');return}input.value=command;sendText(command);return}input.value=text;sendText(text)}
function startRecognition(continuousMode=false){if(!SR){notice.textContent='Voice recognition is not supported in this browser. Use Chrome on Android.';notice.className='error';wakeMode.checked=false;return}if(isListening)return;recognition=new SR();recognition.lang=lang.value;recognition.interimResults=true;recognition.continuous=continuousMode;recognition.maxAlternatives=1;recognition.onstart=()=>{isListening=true;mic.classList.add('listening');mic.textContent='■';transcript.textContent=continuousMode?'Waiting for “Hey Jarvis”…':'Listening…'};recognition.onresult=e=>{let finalText='',partial='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalText+=t;else partial+=t}transcript.textContent=finalText||partial||(continuousMode?'Waiting for “Hey Jarvis”…':'Listening…');if(finalText)handleRecognized(finalText,continuousMode)};recognition.onerror=e=>{if(e.error!=='no-speech'){notice.textContent='Voice error: '+e.error;notice.className='error'}};recognition.onend=()=>{isListening=false;mic.classList.remove('listening');mic.textContent='🎤';if(wakeMode.checked)wakeRestartTimer=setTimeout(()=>startRecognition(true),900)};try{recognition.start()}catch(e){notice.textContent='Voice start failed: '+e.message;notice.className='error'}}
mic.onclick=()=>{if(isListening){stopListening();wakeMode.checked=false;localStorage.setItem('jarvis_wake_mode','false');return}startRecognition(false)};
document.getElementById('testVoice').onclick=()=>speak(lang.value==='te-IN'?'నమస్తే చిన్నా. జార్విస్ సిద్ధంగా ఉంది.':'Hello Chinna. Jarvis voice is ready.');document.getElementById('stopVoice').onclick=()=>window.speechSynthesis&&window.speechSynthesis.cancel();
connect();refresh();setInterval(refresh,10000);if(wakeMode.checked)setTimeout(()=>startRecognition(true),1200);
</script>
</body></html>
