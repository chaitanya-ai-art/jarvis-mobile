<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07101f">
<title>Jarvis</title>
<style>
:root{color-scheme:dark;--bg:#050a13;--card:#101827;--line:#253451;--text:#f2f6ff;--muted:#91a1bd;--accent:#49d7ff;--green:#54e6a4}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#102342 0,#050a13 45%);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
.shell{max-width:760px;margin:auto;min-height:100dvh;display:flex;flex-direction:column;padding:18px 14px env(safe-area-inset-bottom)}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 18px}.brand{font-size:27px;letter-spacing:7px;font-weight:800}.online{color:var(--green);font-size:14px}
.chat{flex:1;display:flex;flex-direction:column;gap:12px;overflow:auto;padding:4px 0 120px}.bubble{max-width:88%;padding:14px 16px;border-radius:18px;line-height:1.45;white-space:pre-wrap}.jarvis{background:var(--card);border:1px solid var(--line);align-self:flex-start}.user{background:#0d6fa1;align-self:flex-end}.system{background:#182239;border:1px dashed #516382;align-self:stretch;color:#cbd7ed;font-size:14px}
.composer{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(760px,100%);padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,#050a13 16%,#050a13)}
.row{display:flex;gap:9px;background:#0d1423;border:1px solid var(--line);border-radius:20px;padding:8px}.row textarea{flex:1;min-height:48px;max-height:140px;resize:none;background:transparent;border:0;color:var(--text);font-size:16px;padding:12px;outline:none}.btn{border:0;border-radius:15px;padding:0 17px;background:#1d2b46;color:white;font-weight:700}.send{background:linear-gradient(135deg,#35c8ff,#5a79ff)}.dev{background:#5038a8}.hint{font-size:12px;color:var(--muted);padding:7px 8px 0}.pulse{animation:pulse 1.2s infinite}@keyframes pulse{50%{opacity:.45}}
</style>
</head>
<body>
<div class="shell">
<header><div class="brand">JARVIS</div><div class="online">● Online</div></header>
<div id="chat" class="chat">
  <div class="bubble jarvis">Hello, Chinna. Ask me anything, or say <b>Develop:</b> followed by the feature you want.</div>
</div>
</div>
<div class="composer">
  <div class="row">
    <textarea id="input" placeholder="Message Jarvis…"></textarea>
    <button id="mic" class="btn" title="Speak">🎤</button>
    <button id="send" class="btn send">Send</button>
  </div>
  <div class="hint">Development example: “Develop: create a mobile notes feature.”</div>
</div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('input');
function add(text,kind='jarvis'){const el=document.createElement('div');el.className='bubble '+kind;el.textContent=text;chat.appendChild(el);el.scrollIntoView({behavior:'smooth'});return el}
function speak(text){if(!('speechSynthesis'in window))return; speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-IN';speechSynthesis.speak(u)}
async function normalChat(message){
  const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message})});
  if(!res.ok)throw new Error(await res.text());
  const data=await res.json();
  return data.reply||data.response||data.message||JSON.stringify(data);
}
async function developer(message){
  const instruction=message.replace(/^(develop|build|create feature)\s*:?\s*/i,'');
  const res=await fetch('/developer/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({instruction})});
  if(!res.ok)throw new Error(await res.text());
  const job=await res.json();
  const status=add('Developer started…','system');
  while(true){
    await new Promise(r=>setTimeout(r,2500));
    const s=await fetch('/developer/status/'+job.id);
    const data=await s.json();
    status.textContent=data.message+(data.branch?'\nBranch: '+data.branch:'')+(data.error?'\nError: '+data.error:'');
    if(['ready','failed'].includes(data.status))break;
  }
}
async function send(){
  const message=input.value.trim();if(!message)return;input.value='';add(message,'user');
  try{
    if(/^(develop|build|create feature)\b/i.test(message)){await developer(message)}
    else{const wait=add('Thinking…','jarvis');wait.classList.add('pulse');const reply=await normalChat(message);wait.classList.remove('pulse');wait.textContent=reply;speak(reply)}
  }catch(e){add('Error: '+e.message,'system')}
}
document.getElementById('send').onclick=send;
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
document.getElementById('mic').onclick=()=>{
  if(!SR){add('Speech recognition is not supported in this browser.','system');return}
  const r=new SR();r.lang='en-IN';r.interimResults=false;
  r.onresult=e=>{input.value=e.results[0][0].transcript;send()};
  r.onerror=e=>add('Voice error: '+e.error,'system');r.start();
};
</script>
</body>
</html>
